<?xml version="1.0" encoding="UTF-8"?>
<!-- Vysdom AI — Rounded icon mark: blue gradient + white serif V -->
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B8FE4"/>
      <stop offset="100%" stop-color="#0A2351"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#icon-bg)"/>

